<!-- slide-11 widget: context-window token-cost visualizer (animated).
     One fixed context window of tokens. #D5D4DF = Available, #D1869E = Taken,
     token glyph = iconmonstr-database-thin.svg.
     Press "Ask": the model SCANS from the very start up to the focal question
     ($1 per token, a $ pops over each scanned token and the running cost ticks
     up), then WRITES the answer which grabs ~3 tokens (also $1 each) — IF there
     is room. If fewer than 3 tokens remain, it AUTO-COMPACTS and re-initiates
     the conversation. Drag the slider to place the same question earlier/later
     and watch the cost change. -->
<div class="ctxviz" id="ctxviz11">
  <div class="cv-caption">One context window — a fixed number of tokens · $1 per token</div>

  <div class="cv-rowwrap">
    <div class="cv-scan" id="cvScan"></div>
    <div class="cv-row" id="cvRow"></div>
  </div>

  <div class="cv-readout">
    Total spent <span class="cv-cost" id="cvCost">$0</span>
    <span class="cv-break" id="cvBreak"></span>
  </div>

  <div class="cv-status" id="cvStatus">Drag the slider, then press “Ask”.</div>

  <div class="cv-controls">
    <label for="cvRange">Conversation already used:&nbsp;<b id="cvPct">10%</b></label>
    <input type="range" id="cvRange" min="0" max="19" value="2">
    <button id="cvAsk" type="button">Ask the question ▶</button>
  </div>

  <div class="cv-legend">
    <span><i class="cv-sw taken"></i> Taken</span>
    <span><i class="cv-sw avail"></i> Available</span>
    <span><i class="cv-sw q"></i> The question</span>
    <span><i class="cv-sw ans"></i> Answer (~3)</span>
  </div>

  <style>
    #ctxviz11 { --avail:#D5D4DF; --taken:#D1869E; --answer:#3E7CB1; --accent:#c0392b;
      --money:#2e7d32; --tok:54px; --gap:10px;
      width:100%; display:flex; flex-direction:column; align-items:center;
      gap:24px; font-family:inherit; color:#111; }
    #ctxviz11 .cv-caption { font-size:32px; }
    #ctxviz11 .cv-rowwrap { position:relative; padding:30px 0 14px; }
    #ctxviz11 .cv-row { display:flex; gap:var(--gap); position:relative; z-index:1; }
    #ctxviz11 .cv-cell { width:var(--tok); height:var(--tok); position:relative;
      display:flex; align-items:center; justify-content:center;
      transition:transform .35s ease, opacity .35s ease; }
    #ctxviz11 .cv-tok { width:100%; height:100%; background-color:var(--avail);
      -webkit-mask:url('assets/iconmonstr-database-thin.svg') center/contain no-repeat;
              mask:url('assets/iconmonstr-database-thin.svg') center/contain no-repeat;
      transition:background-color .18s ease; }
    #ctxviz11 .cv-cell.taken  .cv-tok { background-color:var(--taken); }
    #ctxviz11 .cv-cell.q      .cv-tok { background-color:var(--taken); }
    #ctxviz11 .cv-cell.answer .cv-tok { background-color:var(--answer); }
    #ctxviz11 .cv-cell.q { outline:4px solid var(--accent); outline-offset:5px; border-radius:8px; }
    #ctxviz11 .cv-cell.q::after { content:'?'; position:absolute; top:-32px; left:50%;
      transform:translateX(-50%); color:var(--accent); font-weight:700; font-size:28px; }
    #ctxviz11 .cv-cell.collapsing { transform:scale(0); opacity:0; }
    #ctxviz11 .cv-scan { position:absolute; top:24px; bottom:8px; left:0; width:0;
      background:rgba(255,205,0,.22); border-right:4px solid #e6a700; border-radius:6px;
      z-index:0; transition:width .12s linear; }
    /* floating "$1" markers */
    #ctxviz11 .cv-dollar { position:absolute; top:-4px; font-weight:700;
      color:var(--money); font-size:28px; pointer-events:none; z-index:3; }
    #ctxviz11 .cv-readout { font-size:32px; display:flex; align-items:center; gap:10px; }
    #ctxviz11 .cv-cost { display:inline-block; font-size:72px; font-weight:700;
      color:var(--money); line-height:1; }
    #ctxviz11 .cv-break { font-size:24px; color:#666; }
    #ctxviz11 .cv-status { font-size:26px; color:var(--accent); min-height:32px; }
    #ctxviz11 .cv-controls { display:flex; align-items:center; gap:22px; font-size:28px; }
    #ctxviz11 #cvRange { width:440px; height:8px; accent-color:var(--taken); cursor:pointer; }
    #ctxviz11 #cvAsk { font-family:inherit; font-size:25px; padding:8px 22px;
      border:3px solid var(--accent); border-radius:12px; background:#fff;
      color:var(--accent); cursor:pointer; }
    #ctxviz11 #cvAsk:hover:not(:disabled) { background:var(--accent); color:#fff; }
    #ctxviz11 #cvAsk:disabled, #ctxviz11 #cvRange:disabled { opacity:.45; cursor:default; }
    #ctxviz11 .cv-legend { display:flex; gap:40px; font-size:24px; color:#333; }
    #ctxviz11 .cv-legend span { display:flex; align-items:center; gap:9px; }
    #ctxviz11 .cv-sw { width:24px; height:24px; border-radius:5px; display:inline-block; }
    #ctxviz11 .cv-sw.avail { background:var(--avail); }
    #ctxviz11 .cv-sw.taken { background:var(--taken); }
    #ctxviz11 .cv-sw.ans   { background:var(--answer); }
    #ctxviz11 .cv-sw.q { background:var(--taken); outline:3px solid var(--accent); outline-offset:2px; }
  </style>

  <script>
    (function () {
      const root = document.getElementById('ctxviz11');
      const N = 20, RESP = 3, RATE = 1, COMPACTED = 3;   // tokens, answer size, $/token, compacted length
      const row = root.querySelector('#cvRow');
      const scan = root.querySelector('#cvScan');
      const costEl = root.querySelector('#cvCost');
      const breakEl = root.querySelector('#cvBreak');
      const statusEl = root.querySelector('#cvStatus');
      const pct = root.querySelector('#cvPct');
      const range = root.querySelector('#cvRange');
      const ask = root.querySelector('#cvAsk');

      for (let i = 0; i < N; i++) {
        const cell = document.createElement('div');
        cell.className = 'cv-cell';
        cell.innerHTML = '<div class="cv-tok"></div>';
        row.appendChild(cell);
      }
      const cells = Array.from(row.children);
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      let runId = 0;                                     // cancels a run in progress

      function setCost(c) { costEl.textContent = '$' + c;
        costEl.animate([{ transform: 'scale(1.25)' }, { transform: 'scale(1)' }], { duration: 180 }); }
      function bandTo(i) { scan.style.width = (cells[i].offsetLeft + cells[i].offsetWidth) + 'px'; }
      function popDollar(i) {
        const d = document.createElement('div');
        d.className = 'cv-dollar'; d.textContent = '$1';
        d.style.left = (cells[i].offsetLeft + cells[i].offsetWidth / 2 - 12) + 'px';
        row.appendChild(d);
        d.animate([{ transform: 'translateY(0)', opacity: 1 }, { transform: 'translateY(-60px)', opacity: 0 }],
          { duration: 650, easing: 'ease-out' }).onfinish = () => d.remove();
      }

      function staticPaint(taken) {
        const q = taken;
        cells.forEach((c, i) => {
          c.classList.remove('answer', 'collapsing', 'scanned');
          c.classList.toggle('taken', i < taken);
          c.classList.toggle('q', i === q);
        });
        scan.style.transition = 'none'; scan.style.width = '0px';
        void scan.offsetWidth; scan.style.transition = 'width .12s linear';
        pct.textContent = Math.round((taken / N) * 100) + '%';
        setCost(0); breakEl.textContent = '';
      }

      function setBusy(b) { range.disabled = b; ask.disabled = b; }

      async function compact(id) {
        statusEl.textContent = '⚠ Fewer than ' + RESP + ' tokens left — no room for the answer. Auto-compacting…';
        cells.forEach((c) => { if (c.classList.contains('taken') || c.classList.contains('q')) c.classList.add('collapsing'); });
        await sleep(950);
        if (id !== runId) return;
        range.value = COMPACTED; staticPaint(COMPACTED);
        statusEl.textContent = '↺ Compacted & re-initiated — the long chat is summarized into ~' + COMPACTED + ' tokens. Room to answer again. Press “Ask”.';
      }

      async function run() {
        const id = ++runId;
        setBusy(true);
        const taken = +range.value, q = taken;
        const spaceAfter = N - (q + 1);
        if (spaceAfter < RESP) { await compact(id); setBusy(false); return; }

        let cost = 0;
        statusEl.textContent = 'Scanning from the very start up to the question…';
        for (let i = 0; i <= q; i++) {
          if (id !== runId) return;
          cells[i].classList.add('scanned'); bandTo(i);
          popDollar(i); cost += RATE; setCost(cost);
          await sleep(110);
        }
        breakEl.textContent = '= scan ' + (q + 1);
        statusEl.textContent = 'Writing the answer — it grabs ~' + RESP + ' tokens…';
        for (let j = 0; j < RESP; j++) {
          if (id !== runId) return;
          const idx = q + 1 + j;
          cells[idx].classList.remove('taken'); cells[idx].classList.add('answer');
          popDollar(idx); cost += RATE; setCost(cost);
          await sleep(280);
        }
        breakEl.textContent = '= scan ' + (q + 1) + ' + answer ' + RESP;
        statusEl.textContent = 'Same question, asked here, cost $' + cost + '. Move it later → it costs more.';
        setBusy(false);
      }

      range.addEventListener('input', () => { ++runId; staticPaint(+range.value);
        statusEl.textContent = 'Press “Ask” to spend tokens.'; });
      ask.addEventListener('click', run);
      staticPaint(+range.value);                         // initial render
    })();
  </script>
</div>
